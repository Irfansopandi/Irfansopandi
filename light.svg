<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <rect width="1200" height="630" rx="28" fill="#f8fafc"/>
  <rect x="24" y="24" width="1152" height="582" rx="24" fill="#ffffff" stroke="#2563eb" stroke-opacity="0.28" stroke-width="2"/>
  <circle cx="180" cy="180" r="140" fill="#2563eb" opacity="0.12"/>
  <circle cx="1040" cy="470" r="180" fill="#10b981" opacity="0.12"/>
  <defs>
    <clipPath id="profileClip"><circle cx="280" cy="305" r="100"/></clipPath>
    <linearGradient id="techGlow" x1="0%" x2="100%"><stop offset="0%" stop-color="#2563eb" stop-opacity="0.12"/><stop offset="100%" stop-color="#10b981" stop-opacity="0.06"/></linearGradient>
  </defs>

  <rect x="70" y="90" width="420" height="430" rx="24" fill="#f8fafc" stroke="#e2e8f0"/>
  <!-- Profile image (masked circle) -->
  <image href="assets/profile.jpeg" x="180" y="205" width="200" height="200" preserveAspectRatio="xMidYMid slice" clip-path="url(#profileClip)" />
  <circle id="profOutlineLight" cx="280" cy="305" r="104" fill="none" stroke="url(#techGlow)" stroke-width="3" opacity="0.95">
    <animate attributeName="stroke-width" values="1;4;1" dur="3.6s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.5;0.95;0.5" dur="3.6s" repeatCount="indefinite"/>
  </circle>
  <!-- subtle tech overlay: grid lines clipped to profile (animated) -->
  <g clip-path="url(#profileClip)" opacity="0.12">
    <g id="techLinesLight" stroke="#2563eb" stroke-width="1">
      <line x1="200" y1="240" x2="360" y2="240" >
        <animateTransform attributeName="transform" attributeType="XML" type="translate" values="0,0;0,-5;0,0" dur="3.2s" repeatCount="indefinite"/>
      </line>
      <line x1="220" y1="285" x2="340" y2="285" >
        <animateTransform attributeName="transform" attributeType="XML" type="translate" values="0,0;0,5;0,0" dur="3.6s" repeatCount="indefinite"/>
      </line>
      <line x1="240" y1="330" x2="320" y2="330" >
        <animateTransform attributeName="transform" attributeType="XML" type="translate" values="0,0;0,-4;0,0" dur="2.8s" repeatCount="indefinite"/>
      </line>
      <animate attributeName="opacity" values="0.03;0.12;0.03" dur="4s" repeatCount="indefinite"/>
    </g>
  </g>
  <text x="95" y="180" fill="#0f172a" font-family="Segoe UI, Arial" font-size="28" font-weight="700">Irfan Sopandi</text>
  <text x="95" y="220" fill="#2563eb" font-family="Segoe UI, Arial" font-size="18">Web &amp; Mobile Developer</text>
  <text x="95" y="270" fill="#475569" font-family="Segoe UI, Arial" font-size="16">Mahasiswa Sistem Informasi • UI/UX • Full-stack Enthusiast</text>
  <rect x="95" y="310" width="140" height="34" rx="17" fill="#2563eb"/>
  <text x="165" y="332" text-anchor="middle" fill="#ffffff" font-family="Segoe UI, Arial" font-size="14" font-weight="700">Portfolio</text>
  <rect x="95" y="360" width="300" height="10" rx="5" fill="#e2e8f0"/>
  <rect x="95" y="382" width="240" height="10" rx="5" fill="#e2e8f0"/>
  <rect x="95" y="404" width="260" height="10" rx="5" fill="#e2e8f0"/>
  <text x="560" y="180" fill="#0f172a" font-family="Segoe UI, Arial" font-size="28" font-weight="700">Project Unggulan</text>
  <text x="560" y="225" fill="#2563eb" font-family="Segoe UI, Arial" font-size="18">• Five Fest</text>
  <text x="560" y="255" fill="#475569" font-family="Segoe UI, Arial" font-size="16">Platform konser &amp; festival berbasis web</text>
  <text x="560" y="305" fill="#2563eb" font-family="Segoe UI, Arial" font-size="18">• SIGANA</text>
  <text x="560" y="335" fill="#475569" font-family="Segoe UI, Arial" font-size="16">Sistem tanggap bencana dan donasi</text>
  <text x="560" y="385" fill="#2563eb" font-family="Segoe UI, Arial" font-size="18">• Money Manager App</text>
  <text x="560" y="415" fill="#475569" font-family="Segoe UI, Arial" font-size="16">Aplikasi mobile untuk mengatur keuangan</text>
  <g transform="translate(520,480)">
    <image href="assets/logos/laravel.svg" x="0" y="0" width="36" height="36"/>
    <image href="assets/logos/flutter.svg" x="56" y="0" width="36" height="36"/>
    <image href="assets/logos/php.svg" x="112" y="0" width="36" height="36"/>
    <image href="assets/logos/mysql.svg" x="168" y="0" width="36" height="36"/>
    <image href="assets/logos/figma.svg" x="224" y="0" width="36" height="36"/>
  </g>
</svg>