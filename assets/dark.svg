⠀⠀⠀⣠⣾⣿⣿⣿⣿⣦
</tspan>

<tspan x="70" dy="30">
⠀⠀⣴⣿⣿⣿⣿⣿⣿⣿⣧
</tspan>

<tspan x="75" dy="30">
⠀⣿⣿⣿⠀◉⠀◉⠀⣿⣿⣿
</tspan>

<tspan x="95" dy="30">
⠀⠀⠀IRFAN
</tspan>

<animateTransform
attributeName="transform"
type="translate"
values="0 0;0 -8;0 0"
