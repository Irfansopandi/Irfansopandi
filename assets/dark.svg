<svg width="1180" height="610"
viewBox="0 0 1180 610"
xmlns="http://www.w3.org/2000/svg">

<defs>

<linearGradient id="bg">
<stop offset="0%" stop-color="#030712"/>
<stop offset="100%" stop-color="#08111F"/>
</linearGradient>

<linearGradient id="accent">
<stop offset="0%" stop-color="#7C3AED">
<animate attributeName="stop-color"
values="#7C3AED;#22D3EE;#10B981;#7C3AED"
dur="10s"
repeatCount="indefinite"/>
</stop>

<stop offset="100%" stop-color="#22D3EE">
<animate attributeName="stop-color"
values="#22D3EE;#10B981;#7C3AED;#22D3EE"
dur="10s"
repeatCount="indefinite"/>
</stop>

</linearGradient>

<filter id="blur">
<feGaussianBlur stdDeviation="40"/>
</filter>

</defs>

<rect width="1180"
height="610"
rx="40"
fill="url(#bg)"/>

<circle cx="250"
cy="200"
r="180"
fill="#7C3AED"
opacity=".15"
filter="url(#blur)">

<animate attributeName="cx"
values="250;300;250"
dur="8s"
repeatCount="indefinite"/>

</circle>

<circle cx="900"
cy="450"
r="220"
fill="#22D3EE"
opacity=".12"
filter="url(#blur)">

<animate attributeName="cy"
values="450;400;450"
dur="10s"
repeatCount="indefinite"/>

</circle>

<rect
x="35"
y="35"
width="390"
height="540"
rx="35"
fill="#0F172A"
opacity=".75"
stroke="#ffffff20"/>

<rect
x="455"
y="35"
width="690"
height="540"
rx="35"
fill="#0F172A"
opacity=".75"
stroke="#ffffff20"/>

<text
x="90"
y="200"
fill="url(#accent)"
font-size="18"
font-family="monospace">

⠀⠀⠀⠀⣀⣀⣀⣀
